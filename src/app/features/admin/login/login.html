<div class="login-page">
  <div class="login-card">

    <div class="login-card__brand">
      <span class="login-card__icon">⚙️</span>
      <h1 class="login-card__title">LotesRB Admin</h1>
      <p class="login-card__sub">Acceso restringido</p>
    </div>

    <form #f="ngForm" class="login-form" (ngSubmit)="f.valid && onSubmit()" novalidate>

      <div class="campo" [class.campo--error]="emailRef.invalid && emailRef.touched">
        <label class="campo__label" for="email">Correo electrónico</label>
        <input
          class="campo__input"
          id="email" name="email"
          type="email"
          autocomplete="email"
          placeholder="admin@ejemplo.com"
          [(ngModel)]="email"
          #emailRef="ngModel"
          required email
        />
        @if (emailRef.invalid && emailRef.touched) {
          <span class="campo__error">Ingresa un correo válido.</span>
        }
      </div>

      <div class="campo" [class.campo--error]="passRef.invalid && passRef.touched">
        <label class="campo__label" for="password">Contraseña</label>
        <input
          class="campo__input"
          id="password" name="password"
          type="password"
          autocomplete="current-password"
          placeholder="••••••••"
          [(ngModel)]="password"
          #passRef="ngModel"
          required minlength="6"
        />
        @if (passRef.invalid && passRef.touched) {
          <span class="campo__error">Mínimo 6 caracteres.</span>
        }
      </div>

      @if (error()) {
        <p class="login-form__error">{{ error() }}</p>
      }

      <button type="submit" class="login-form__btn" [disabled]="cargando()">
        @if (cargando()) { Ingresando… } @else { Ingresar }
      </button>

    </form>
  </div>
</div>
